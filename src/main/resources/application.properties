# --- SECURITY WARNING ---
# Do NOT store secrets in this file for production!
# Use environment variables instead (e.g., JWT_SECRET, GOOGLE_CLIENT_SECRET)
#
# To set secrets in production:
#   export JWT_SECRET=your_64_byte_base64_secret
#   export GOOGLE_CLIENT_SECRET=your_google_secret
#
# Rotate Google client secret regularly in Google Cloud Console.

spring.application.name=signal


# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/signal
spring.datasource.username=postgres
spring.datasource.password=local
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret (must be at least 64 bytes for HS512)
jwt.secret=Qk9vQ2p6b3h2d2p6b3h2Qk9vQ2p6b3h2d2p6b3h2Qk9vQ2p6b3h2d2p6b3h2Qk9vQ2p6b3h2d2p6b3h2Qk9vQ2p6b3h2d2p6b3h2
# JWT Expiration (optional, default 1 day)
jwt.expiration=86400000
