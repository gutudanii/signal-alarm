<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Signal Alarm</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #F5F7FA 0%, #EFF2F8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }

    /* Main Card */
    .reset-card {
        max-width: 480px;
        width: 100%;
        background: #FFFFFF;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.02);
        overflow: hidden;
        animation: fadeInUp 0.4s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Header with brand gradient */
    .card-header {
        background: linear-gradient(135deg, #0C1A34 0%, #112240 100%);
        padding: 40px 32px 36px 32px;
        text-align: center;
    }

    .accent-line {
        width: 48px;
        height: 3px;
        background: #E5CEAF;
        margin: 0 auto 20px auto;
        border-radius: 4px;
    }

    .brand-name {
        font-size: 28px;
        font-weight: 600;
        color: #FFFFFF;
        letter-spacing: -0.3px;
        margin-bottom: 8px;
    }

    .brand-tagline {
        font-size: 13px;
        color: rgba(229, 206, 175, 0.85);
        font-weight: 400;
        letter-spacing: 0.2px;
    }

    .security-badge {
        display: inline-block;
        background: rgba(229, 206, 175, 0.12);
        backdrop-filter: blur(4px);
        padding: 6px 14px;
        border-radius: 40px;
        font-size: 12px;
        color: #E5CEAF;
        font-weight: 500;
        margin-top: 20px;
    }

    /* Body Content */
    .card-body {
        padding: 40px 32px 32px 32px;
    }

    .title {
        font-size: 24px;
        font-weight: 600;
        color: #0C1A34;
        margin-bottom: 8px;
        letter-spacing: -0.2px;
    }

    .subtitle {
        font-size: 14px;
        color: #6B7A8F;
        margin-bottom: 32px;
        line-height: 1.5;
    }

    /* Form Groups */
    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #1E2F44;
        margin-bottom: 8px;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        font-size: 18px;
    }

    .form-input {
        width: 100%;
        padding: 12px 16px 12px 48px;
        font-size: 15px;
        font-family: inherit;
        border: 1.5px solid #E2E8F0;
        border-radius: 14px;
        background: #FFFFFF;
        transition: all 0.2s ease;
        color: #1A2C3E;
    }

    .form-input:focus {
        outline: none;
        border-color: #E5CEAF;
        box-shadow: 0 0 0 3px rgba(229, 206, 175, 0.2);
    }

    .form-input.error {
        border-color: #E53E3E;
    }

    .error-message {
        font-size: 12px;
        color: #E53E3E;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* Password Requirements */
    .password-requirements {
        margin-top: 12px;
        padding: 12px 16px;
        background: #FAF9F7;
        border-radius: 12px;
        border-left: 3px solid #E5CEAF;
    }

    .req-title {
        font-size: 11px;
        font-weight: 600;
        color: #5A6B7F;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .req-list {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
    }

    .req-item {
        font-size: 11px;
        color: #6F7D95;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .req-item.valid {
        color: #2E7D32;
    }

    .req-item.invalid {
        color: #9AA7BF;
    }

    /* Gradient Button */
    .btn-reset {
        width: 100%;
        background: linear-gradient(105deg, #E5CEAF 0%, #DCBF96 100%);
        color: #0C1A34;
        text-decoration: none;
        padding: 14px 24px;
        border-radius: 60px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(12, 26, 52, 0.08);
        margin-top: 8px;
        display: inline-block;
        width: 100%;
    }

    .btn-reset:hover:not(:disabled) {
        background: linear-gradient(105deg, #d4bb95 0%, #c9ae82 100%);
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(12, 26, 52, 0.12);
    }

    .btn-reset:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* Alert Messages */
    .alert {
        padding: 14px 16px;
        border-radius: 14px;
        margin-bottom: 24px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-error {
        background: #FEF2F2;
        border-left: 4px solid #E53E3E;
        color: #C53030;
    }

    .alert-success {
        background: #F0FDF4;
        border-left: 4px solid #2E7D32;
        color: #1E4620;
    }

    .alert-info {
        background: #FEF9E6;
        border-left: 4px solid #E5CEAF;
        color: #7C6B3E;
    }

    /* Loading Spinner */
    .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(12, 26, 52, 0.2);
        border-top-color: #0C1A34;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Footer */
    .card-footer {
        background: #FCFCFD;
        padding: 20px 32px 24px;
        text-align: center;
        border-top: 1px solid #F0F3F9;
    }

    .footer-divider {
        width: 32px;
        height: 2px;
        background: #E5CEAF;
        margin: 0 auto 16px auto;
        border-radius: 2px;
    }

    .footer-text {
        font-size: 11px;
        color: #8C9AB0;
        line-height: 1.5;
    }

    .support-link {
        color: #0C1A34;
        text-decoration: none;
        font-weight: 500;
        border-bottom: 1px solid #E5CEAF;
    }

    /* Success State */
    .success-icon {
        width: 64px;
        height: 64px;
        background: #F0FDF4;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 32px;
    }

    @media (max-width: 520px) {
        body {
            padding: 16px;
        }
        .card-body {
            padding: 32px 24px 24px 24px;
        }
        .card-header {
            padding: 32px 24px 28px 24px;
        }
    }
  </style>
</head>
<body>

<div class="reset-card" id="resetCard">
  <div class="card-header">
    <div class="accent-line"></div>
    <div class="brand-name">Signal Alarm</div>
    <div class="brand-tagline">precision trading intelligence</div>
    <div class="security-badge">🔐 secure password reset</div>
  </div>

  <div id="dynamicContent">
    <!-- Content will be injected dynamically -->
  </div>
</div>

<script>
  // Get token from URL
  function getTokenFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('token');
  }

  // API endpoint (adjust to your backend)
  const API_BASE_URL = 'http://localhost:8080/api/auth/reset-password';
  const token = getTokenFromUrl();

  // DOM elements
  const dynamicContent = document.getElementById('dynamicContent');

  // State
  let newPassword = '';
  let confirmPassword = '';

  // Validation function: only check for minimum 8 characters
  function validatePassword(password) {
      const minLength = password.length >= 8;
      return {
          isValid: minLength,
          checks: { minLength }
      };
  }

  function renderRequirements(password) {
      const validation = validatePassword(password);
      const checks = validation.checks;
      return `
          <div class="password-requirements">
              <div class="req-title">password requirements</div>
              <div class="req-list">
                  <span class="req-item ${checks.minLength ? 'valid' : 'invalid'}">${checks.minLength ? '✓' : '○'} 8+ characters</span>
              </div>
          </div>
      `;
  }

  // Render form (fixed: only re-render requirements and errors, not the whole form)
  function renderForm(errorMessage = null, successMessage = null) {
      const validation = validatePassword(newPassword);
      const passwordsMatch = newPassword === confirmPassword && newPassword !== '';
      const isFormValid = validation.isValid && passwordsMatch && newPassword !== '';

      let alertHtml = '';
      if (errorMessage) {
          alertHtml = `
              <div class="alert alert-error">
                  <span>⚠️</span>
                  <span>${errorMessage}</span>
              </div>
          `;
      }
      if (successMessage) {
          alertHtml = `
              <div class="alert alert-success">
                  <span>✓</span>
                  <span>${successMessage}</span>
              </div>
          `;
      }

      const formHtml = `
          <div class="card-body">
              ${alertHtml}

              <h2 class="title">Create new password</h2>
              <p class="subtitle">Choose a strong password to secure your account</p>

              <div class="form-group">
                  <label class="form-label">New password</label>
                  <div class="input-wrapper">
                      <span class="input-icon">🔒</span>
                      <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" autocomplete="new-password">
                  </div>
                  <div id="passwordRequirements"></div>
              </div>

              <div class="form-group">
                  <label class="form-label">Confirm password</label>
                  <div class="input-wrapper">
                      <span class="input-icon">✓</span>
                      <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" autocomplete="new-password">
                  </div>
                  <div id="passwordMatchError"></div>
              </div>

              <button id="submitBtn" class="btn-reset" ${!isFormValid ? 'disabled' : ''}>
                  Reset password
              </button>
          </div>
          <div class="card-footer">
              <div class="footer-divider"></div>
              <div class="footer-text">
                  © 2026 Signal Alarm. All rights reserved.<br>
                  Need help? <a href="#" class="support-link">Contact support</a>
              </div>
          </div>
      `;

      dynamicContent.innerHTML = formHtml;

      // Attach event listeners only once
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const submitBtn = document.getElementById('submitBtn');

      // Set values if already typed
      newPasswordInput.value = newPassword;
      confirmPasswordInput.value = confirmPassword;

      // Render requirements and error
      document.getElementById('passwordRequirements').innerHTML = newPassword ? renderRequirements(newPassword) : '';
      document.getElementById('passwordMatchError').innerHTML = (confirmPassword && !passwordsMatch && newPassword) ? '<div class="error-message"><span>⚠️</span> Passwords do not match</div>' : '';

      // Add error class if needed
      if (confirmPassword && !passwordsMatch && newPassword) {
          confirmPasswordInput.classList.add('error');
      } else {
          confirmPasswordInput.classList.remove('error');
      }

      newPasswordInput.addEventListener('input', (e) => {
          newPassword = e.target.value;
          // Only update requirements and error, not the whole form
          document.getElementById('passwordRequirements').innerHTML = newPassword ? renderRequirements(newPassword) : '';
          updateButtonState();
      });

      confirmPasswordInput.addEventListener('input', (e) => {
          confirmPassword = e.target.value;
          // Only update error, not the whole form
          const passwordsMatch = newPassword === confirmPassword && newPassword !== '';
          document.getElementById('passwordMatchError').innerHTML = (confirmPassword && !passwordsMatch && newPassword) ? '<div class="error-message"><span>⚠️</span> Passwords do not match</div>' : '';
          if (confirmPassword && !passwordsMatch && newPassword) {
              confirmPasswordInput.classList.add('error');
          } else {
              confirmPasswordInput.classList.remove('error');
          }
          updateButtonState();
      });

      if (submitBtn) {
          submitBtn.addEventListener('click', () => handleSubmit());
      }

      function updateButtonState() {
          const validation = validatePassword(newPassword);
          const passwordsMatch = newPassword === confirmPassword && newPassword !== '';
          const isFormValid = validation.isValid && passwordsMatch && newPassword !== '';
          submitBtn.disabled = !isFormValid;
      }
  }

  // Render invalid token state
  function renderInvalidToken() {
      dynamicContent.innerHTML = `
          <div class="card-body" style="text-align: center;">
              <div style="font-size: 64px; margin-bottom: 20px;">🔒</div>
              <h2 class="title">Invalid or expired link</h2>
              <p class="subtitle" style="margin-bottom: 24px;">
                  This password reset link is no longer valid. It may have expired or already been used.
              </p>
              <div class="alert alert-info" style="margin-bottom: 0;">
                  <span>💡</span>
                  <span>Request a new password reset from the login page</span>
              </div>

          </div>
          <div class="card-footer">
              <div class="footer-divider"></div>
              <div class="footer-text">© 2026 Signal Alarm. All rights reserved.</div>
          </div>
      `;
  }

  // Render loading state
  function renderLoading() {
      dynamicContent.innerHTML = `
          <div class="card-body" style="text-align: center; padding: 60px 32px;">
              <div class="spinner" style="width: 40px; height: 40px; border-width: 3px; margin: 0 auto 20px;"></div>
              <p style="color: #6B7A8F; font-size: 14px;">Verifying reset link...</p>
          </div>
      `;
  }

  // Render success state
  function renderSuccess() {
      dynamicContent.innerHTML = `
          <div class="card-body" style="text-align: center;">
              <div class="success-icon">
                  ✓
              </div>
              <h2 class="title">Password reset successful</h2>
              <p class="subtitle" style="margin-bottom: 24px;">
                  Your password has been updated. You can now log in with your new credentials.
              </p>

          </div>
          <div class="card-footer">
              <div class="footer-divider"></div>
              <div class="footer-text">© 2026 Signal Alarm. All rights reserved.</div>
          </div>
      `;
  }

  // Handle form submission
  async function handleSubmit() {
      const validation = validatePassword(newPassword);
      const passwordsMatch = newPassword === confirmPassword;

      if (!validation.isValid) {
          renderForm('Please meet all password requirements');
          return;
      }

      if (!passwordsMatch) {
          renderForm('Passwords do not match');
          return;
      }

      // Show loading state on button
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Resetting...';

      try {
          const response = await fetch(API_BASE_URL, {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                  token: token,
                  newPassword: newPassword
              })
          });

          const data = await response.json();

          if (response.ok) {
              renderSuccess();
          } else {
              const errorMsg = data.message || 'Failed to reset password. The link may have expired.';
              renderForm(errorMsg);
          }
      } catch (error) {
          console.error('Reset error:', error);
          renderForm('Network error. Please check your connection and try again.');
      }
  }

  // Initialize - validate token presence
  if (!token) {
      renderInvalidToken();
  } else {
      renderLoading();
      // Optional: verify token validity with backend before showing form
      // For now, just show form after a brief delay
      setTimeout(() => {
          renderForm();
      }, 500);
  }
</script>

</body>
</html>
